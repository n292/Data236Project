server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (resumes up to 20MB)
    client_max_body_size 20M;

    # Profile service: auth + members
    location /api/auth/ {
        proxy_pass http://profile-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/members/ {
        proxy_pass http://profile-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Job service
    location /api/v1/jobs/ {
        proxy_pass http://job-service:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Application service (strip /api prefix — service serves at /applications/)
    location /api/applications/ {
        proxy_pass http://application-service:5003/applications/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Allow large multipart uploads
        proxy_request_buffering off;
        client_max_body_size 20M;
    }

    # Resume uploads served by application service
    location /uploads/ {
        proxy_pass http://application-service:5003/uploads/;
        proxy_set_header Host $host;
    }

    # Connection service
    location /api/connections/ {
        proxy_pass http://connection-service:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Messaging service
    location /api/messaging/ {
        proxy_pass http://messaging-service:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # AI service (SSE streaming — disable buffering)
    location /ai/task-stream/ {
        proxy_pass http://ai-service:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location /ai/ {
        proxy_pass http://ai-service:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Analytics service
    location /analytics/ {
        proxy_pass http://analytics-service:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /events/ {
        proxy_pass http://analytics-service:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE live feed for recruiter dashboard
    location /recruiter/live-feed/ {
        proxy_pass http://analytics-service:4000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass http://job-service:3002;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
