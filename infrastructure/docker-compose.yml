# Local Kafka for DATA236 (Member 2 job-service topics: job.created, application.submitted, …)
# Run from this directory:
#   docker compose up -d
# Host apps (job-service on your Mac) use: KAFKA_BROKERS=127.0.0.1:9092

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: data236-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - data236

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: data236-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - data236

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: data236-kafka-ui
    depends_on:
      - kafka
    ports:
      - "18088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: data236-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - data236

  mysql:
    image: mysql:8.0
    container_name: data236-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Password123!
      MYSQL_DATABASE: data236
    ports:
      - "3308:3306"
    volumes:
      - data236_mysql:/var/lib/mysql
    networks:
      - data236

  job-service:
    build:
      context: ../services/job-service
    container_name: data236-job-service
    depends_on:
      - mysql
      - kafka
    ports:
      - "3003:3002"
    environment:
      PORT: 3002
      NODE_ENV: development
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: Password123!
      MYSQL_DATABASE: data236
      KAFKA_BROKERS: kafka:29092
      KAFKA_AUTO_CREATE_TOPICS: "true"
      KAFKA_TOPIC_JOB_CREATED: job.created
      KAFKA_TOPIC_JOB_CLOSED: job.closed
      KAFKA_TOPIC_JOB_VIEWED: job.viewed
      KAFKA_TOPIC_JOB_SAVED: job.saved
    command: sh -c "npm run db:migrate && node src/server.js"
    networks:
      - data236

networks:
  data236:
    driver: bridge

volumes:
  data236_mysql:
