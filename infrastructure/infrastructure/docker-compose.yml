services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: data236-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - data236

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: data236-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - data236

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: data236-kafka-ui
    depends_on:
      - kafka
    ports:
      - "18088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: data236-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - data236

  mysql:
    image: mysql:8.0
    container_name: data236-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Password123!
      MYSQL_DATABASE: data236
    ports:
      - "3308:3306"
    volumes:
      - data236_mysql:/var/lib/mysql
      - ./init-mysql:/docker-entrypoint-initdb.d
    networks:
      - data236
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pPassword123!"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: data236-mongodb
    ports:
      - "27017:27017"
    volumes:
      - data236_mongo:/data/db
    networks:
      - data236
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: data236-redis
    ports:
      - "6379:6379"
    networks:
      - data236
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  profile-service:
    build:
      context: ../services/profile-service/backend
    container_name: data236-profile-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "8002:8000"
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: Password123!
      MYSQL_DB: data236
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CLIENT_ID: profile-service
      REDIS_URL: redis://redis:6379
      SECRET_KEY: "changeme-replace-with-32-char-random-string"
      FRONTEND_URL: "http://localhost:3000"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "http://localhost:8002/api/auth/google/callback"
    networks:
      - data236

  job-service:
    build:
      context: ../services/job-service
    container_name: data236-job-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: development
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: Password123!
      MYSQL_DATABASE: data236
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: job-service
      KAFKA_AUTO_CREATE_TOPICS: "true"
      KAFKA_TOPIC_JOB_CREATED: job.created
      KAFKA_TOPIC_JOB_CLOSED: job.closed
      KAFKA_TOPIC_JOB_VIEWED: job.viewed
      KAFKA_TOPIC_JOB_SAVED: job.saved
      REDIS_URL: redis://redis:6379
      REDIS_TTL_SEARCH_SECONDS: 60
      REDIS_TTL_GET_SECONDS: 10
      JWT_SECRET: "changeme-replace-with-32-char-random-string"
    command: sh -c "npm run db:migrate && node src/server.js"
    networks:
      - data236

  application-service:
    build:
      context: ../services/application-service
    container_name: data236-application-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Password123!
      DB_NAME: application_db
      DB_PORT: 3306
      KAFKA_BROKER: kafka:29092
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: application-service
      JWT_SECRET: "changeme-replace-with-32-char-random-string"
    command: sh -c "npm run db:migrate && node src/server.js"
    networks:
      - data236

  connection-service:
    build:
      context: ../services/connection-service
    container_name: data236-connection-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: Password123!
      MYSQL_DATABASE: linkedin_connections
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: connection-service
      PROFILE_SERVICE_URL: http://profile-service:8000
    networks:
      - data236

  messaging-service:
    build:
      context: ../services/messaging-service
    container_name: data236-messaging-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGODB_URI: mongodb://mongodb:27017/linkedin_messaging
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: messaging-service
    networks:
      - data236

  analytics-service:
    build:
      context: ../services/analytics-service
    container_name: data236-analytics-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/linkedin_analytics
      KAFKA_BROKERS: kafka:29092
    networks:
      - data236

  ai-service:
    build:
      context: ../services/ai-service
    container_name: data236-ai-service
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8005:8005"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/linkedin_ai
    networks:
      - data236

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: data236-frontend
    depends_on:
      - job-service
      - profile-service
    ports:
      - "3000:80"
    networks:
      - data236

networks:
  data236:
    driver: bridge

volumes:
  data236_mysql:
  data236_mongo:
